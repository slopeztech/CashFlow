{% load static i18n %}
<!doctype html>
<html lang="{{ request.LANGUAGE_CODE|default:'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% trans 'Sign in' %} | {{ ui_settings.store_name|default:'CashFlow' }}</title>
    <link rel="stylesheet" href="{% static 'vendor/staradmin2/assets/vendors/feather/feather.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/staradmin2/assets/vendors/mdi/css/materialdesignicons.min.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/staradmin2/assets/vendors/ti-icons/css/themify-icons.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/staradmin2/assets/vendors/font-awesome/css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/staradmin2/assets/vendors/typicons/typicons.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/staradmin2/assets/vendors/simple-line-icons/css/simple-line-icons.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/staradmin2/assets/vendors/css/vendor.bundle.base.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/staradmin2/assets/css/style.css' %}">
    <link rel="shortcut icon" href="{% static 'vendor/staradmin2/assets/images/favicon.png' %}">
    <style>
      .brand-wordmark {
        display: inline-flex;
        align-items: center;
        font-weight: 800;
        letter-spacing: .03em;
        line-height: 1;
        text-decoration: none;
        white-space: nowrap;
        background: linear-gradient(90deg, {{ ui_settings.brand_color_primary|default:'#111827' }} 0%, {{ ui_settings.brand_color_secondary|default:'#5E8DF5' }} 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .brand-wordmark.brand-wordmark-lg {
        font-size: 1.45rem;
      }
    </style>
  </head>
  <body>
    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="content-wrapper d-flex align-items-center auth px-0">
          <div class="row w-100 mx-0">
            <div class="col-lg-4 mx-auto">
              <div class="auth-form-light text-left py-5 px-4 px-sm-5 card-rounded">
                <div class="brand-logo mb-4 text-center">
                  <span class="brand-wordmark brand-wordmark-lg" aria-label="{{ ui_settings.store_name|default:'CashFlow' }}">{{ ui_settings.store_name|default:'CashFlow' }}</span>
                </div>
                <form method="post" class="pt-3">
                  {% csrf_token %}

                  {% if form.non_field_errors %}
                    <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                  {% endif %}

                  <div class="form-group">
                    <label for="id_username" class="form-label">{% trans 'Username' %}</label>
                    {{ form.username }}
                  </div>
                  <div class="form-group">
                    <label for="id_password" class="form-label">{% trans 'Password' %}</label>
                    {{ form.password }}
                  </div>

                  <div class="mt-3 d-grid gap-2">
                    <button class="btn btn-primary btn-lg fw-medium auth-form-btn" type="submit">{% trans 'SIGN IN' %}</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{% static 'vendor/staradmin2/assets/vendors/js/vendor.bundle.base.js' %}"></script>
    <script src="{% static 'vendor/staradmin2/assets/js/off-canvas.js' %}"></script>
    <script src="{% static 'vendor/staradmin2/assets/js/template.js' %}"></script>
  </body>
</html>
